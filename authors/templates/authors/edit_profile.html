{% extends "authors/base.html" %} {% block content %}

<main class="page">
    <article class="layout" style="grid-template-columns: 1fr">
        <section class="feed">
            <header>
                <h1 class="feed-title">Edit Profile</h1>
            </header>

            <article class="post-card" style="max-width: 520px; margin: 0 auto">
                <form method="POST">
                    {% csrf_token %} {% for field in form %}
                    <p class="form-row">
                        <label
                            class="form-label"
                            for="{{ field.id_for_label }}"
                        >
                            {{ field.label }}
                        </label>

                        {{ field }} {% for e in field.errors %}
                        <small class="field-error" style="display: block">
                            {{ e }}
                        </small>
                        {% endfor %}
                    </p>
                    {% endfor %}

                    <menu
                        class="form-actions"
                        style="justify-content: flex-end; padding: 0"
                    >
                        <a
                            href="{% url 'author-profile' pk=request.user.pk %}"
                            class="pill"
                        >
                            Cancel
                        </a>

                        <button type="submit" class="pill">Save Changes</button>
                    </menu>
                </form>
            </article>
        </section>
    </article>
</main>

{% endblock %}
