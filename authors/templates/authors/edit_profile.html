{% extends 'authors/base.html' %} {% block content %}
<div
    class="post-card"
    style="
        max-width: 500px;
        margin: 40px auto;
        border: 1px solid var(--border);
        border-radius: 8px;
    "
>
    <h2 style="margin-top: 0; color: var(--accent)">Edit Profile</h2>

    <form method="POST">
        {% csrf_token %} {% for field in form %}
        <div style="margin-bottom: 15px">
            <label
                style="
                    display: block;
                    margin-bottom: 5px;
                    color: var(--text-muted);
                    font-weight: bold;
                "
            >
                {{ field.label }}
            </label>
            {{ field }} {% if field.help_text %}
            <small style="color: var(--text-muted)"
                >{{ field.help_text }}</small
            >
            {% endif %}
        </div>
        {% endfor %}

        <div style="margin-top: 20px; text-align: right">
            <a
                href="{% url 'author-profile' pk=request.user.id %}"
                class="btn btn-outline"
                style="margin-right: 10px"
                >Cancel</a
            >
            <button type="submit" class="btn">Save Changes</button>
        </div>
    </form>
</div>

<style>
    .form-control {
        width: 100%;
        padding: 10px;
        background-color: var(--bg-color);
        border: 1px solid var(--border);
        color: var(--text-main);
        border-radius: 4px;
        box-sizing: border-box;
    }
    .form-control:focus {
        outline: none;
        border-color: var(--accent);
    }
</style>
{% endblock %}
