{% extends "authors/base.html" %}
{% block content %}

<main class="page">
  <div class="layout" style="grid-template-columns: 1fr;">
    <section class="feed">
      <h1 class="feed-title">Edit Profile</h1>

      <article class="post-card" style="max-width: 520px; margin: 0 auto;">
        <form method="POST">
          {% csrf_token %}

          {% for field in form %}
            <div class="form-row">
              <label class="form-label" for="{{ field.id_for_label }}">
                {{ field.label }}
              </label>

              {{ field }}

              {% for e in field.errors %}
                <div class="field-error">{{ e }}</div>
              {% endfor %}
            </div>
          {% endfor %}

          <div class="form-actions" style="justify-content: flex-end;">
            <a href="{% url 'author-profile' pk=request.user.pk %}" class="pill">
              Cancel
            </a>

            <button type="submit" class="pill">
              Save Changes
            </button>
          </div>
        </form>
      </article>
    </section>
  </div>
</main>

{% endblock %}
