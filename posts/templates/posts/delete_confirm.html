{% load static %}
<!doctype html>
<html>
<head>
  <title>Delete Post</title>
  <link rel="stylesheet" href="{% static 'honeydew/style.css' %}"> <!-- Load the CSS file for styling -->
</head>

<body class="delete-page">
  <main class="delete-card">
    <h2 class="delete-title">Delete Post?</h2>
    <p class="delete-sub">
      You are about to delete:
    </p>

    <p class="delete-post-title">
      {{ post.title|default:"(no title)" }} <!-- Show the title of the post being deleted, or "(no title)" if it doesn't have one -->
    </p>

    <form method="post" class="delete-actions">
      {% csrf_token %}
      <button type="submit" class="btn-danger"> <!-- Submit button to confirm deletion of the post -->
        Yes, delete
      </button>
      <a href="{% url 'posts:stream' %}">Cancel</a> <!-- Link to go back to the stream page if the user decides not to delete the post -->
    </form>
  </main>
</body>
</html>
