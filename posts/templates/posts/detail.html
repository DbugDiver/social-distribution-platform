{% load static %}
<!doctype html>
<html lang="en">
<head>
  <title>{{ post.title }}</title>
  <link rel="stylesheet" href="{% static 'honeydew/style.css' %}">
</head>
<body>

<main>
  <article aria-labelledby="post-title">
    <header>
      <h1 id="post-title">{{ post.title }}</h1>

      <dl>
        <dt><strong>Author:</strong></dt>
        <dd>{{ post.author.username }}</dd>

        <dt><strong>Created:</strong></dt>
        <dd>
          <time datetime="{{ post.created|date:'c' }}">{{ post.created }}</time>
        </dd>

        <dt><strong>Visibility:</strong></dt>
        <dd>{{ post.visibility }}</dd>
      </dl>
    </header>

    <section aria-label="Post content">
      {% if rendered %}
        {{ rendered|safe }}
      {% else %}
        <p>{{ post.content }}</p>
      {% endif %}
    </section>

    <footer>
      <a href="{% url 'posts:stream' %}">Back to Stream</a>
    </footer>
  </article>
</main>
</body>
</html>
