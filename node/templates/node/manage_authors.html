{% load static %}
<!doctype html>
<html>

<head>
<link rel="stylesheet" href="{% static 'honeydew/style.css' %}">
</head>

<body class="node-admin-page">

<main class="node-author-admin">

<h2>Author Management</h2>

<ul class="author-list">

{% for author in authors %}
<li>

<article class="author-row">

<a class="author-link" href="{% url 'posts:author-posts' author.id %}">
{{ author.displayName|default:author.username }} | {{ author.username }}
</a>

<span class="author-actions">

<a class="icon-btn admin-icon"
href="{% url 'edit-profile' author.id %}">
✏️
</a>

<a class="icon-btn delete-btn admin-icon"
href="{% url 'delete-author' author.id %}">
🗑
</a>

</span>

</article>

</li>
{% endfor %}

</ul>

</main>

<nav class="admin-back-container">
<a href="{% url 'node-admin-dashboard' %}" class="nav-link admin-back-stream">
← Back to Node Admin
</a>
</nav>

</body>
</html>
