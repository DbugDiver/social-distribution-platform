{% load static %}
<!doctype html>
<html>

<head>
  <link rel="stylesheet" href="{% static 'honeydew/style.css' %}">
</head>

<body class="node-admin-page" style="background-color: #f5f5f5; font-family: Arial, sans-serif;">

<main style="display: flex; justify-content: center; align-items: flex-start; min-height: 80vh; padding-top: 2rem;">

  <section style="background-color: #fff; 
                  border: 2px solid #4fc3f7; 
                  border-radius: 12px; 
                  box-shadow: 0 6px 15px rgba(0,0,0,0.1); 
                  padding: 2rem; 
                  max-width: 600px; 
                  width: 100%;">
    
    <h2 style="margin-bottom: 1.5rem; color: #333; text-align: center;">Author Management</h2>

    <ul style="list-style: none; padding: 0; margin: 0;">

      {% for author in authors %}
        <li style="margin-bottom: 1rem; border-bottom: 1px solid #eee; padding-bottom: 0.5rem; display: flex; justify-content: space-between; align-items: center;">
          
          <a class="author-link" href="{% url 'posts:author-posts' author.id %}" style="color: #00796b; text-decoration: none; font-weight: bold;">
            {{ author.displayName|default:author.username }} | {{ author.username }}
          </a>

          <span class="author-actions" style="display: flex; gap: 0.5rem;">
            <a class="icon-btn admin-icon" href="{% url 'edit-profile' author.id %}" 
               style="text-decoration: none; font-size: 1.2rem; cursor: pointer;">
              ✏️
            </a>

            <a class="icon-btn delete-btn admin-icon" href="{% url 'delete-author' author.id %}" 
               style="text-decoration: none; font-size: 1.2rem; cursor: pointer;">
              🗑
            </a>
          </span>

        </li>
      {% endfor %}

    </ul>

  </section>

</main>

<nav style="display: flex; justify-content: center; margin-top: 2rem;">
  <a href="{% url 'node-admin-dashboard' %}" 
     style="display: inline-block;
            text-decoration: none;
            color: white;
            background-color: #00796b;
            padding: 0.6rem 1.2rem;
            border-radius: 25px;
            font-weight: bold;
            transition: background-color 0.3s ease;"
     onmouseover="this.style.backgroundColor='#004d40';"
     onmouseout="this.style.backgroundColor='#00796b';">
      ← Back to Node Admin
  </a>
</nav>

</body>
</html>
