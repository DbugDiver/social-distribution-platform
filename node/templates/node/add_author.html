{% load static %}
<!doctype html>
<html>
<head>
  <title>Add Author</title>
  <link rel="stylesheet" href="{% static 'honeydew/style.css' %}">
</head>

<body class="node-admin-page" style="background-color: #f5f5f5; font-family: Arial, sans-serif;">

<main style="display: flex; justify-content: center; align-items: center; min-height: 80vh;">

  <section style="background-color: #fff; 
                  border: 2px solid #4fc3f7; 
                  border-radius: 12px; 
                  box-shadow: 0 6px 15px rgba(0,0,0,0.1); 
                  padding: 2rem; 
                  max-width: 400px; 
                  width: 100%;
                  text-align: center;">
    
    <header>
      <h2 style="margin-bottom: 1.5rem; color: #333;">Add Author</h2>
    </header>

    <form method="POST" style="display: flex; flex-direction: column; gap: 1rem;">
        {% csrf_token %}

        <label for="username" style="text-align: left; color: #555;">Username</label>
        <input id="username" type="text" name="username" style="padding: 0.5rem; border: 1px solid #ccc; border-radius: 6px;">

        <label for="password" style="text-align: left; color: #555;">Password</label>
        <input id="password" type="password" name="password" style="padding: 0.5rem; border: 1px solid #ccc; border-radius: 6px;">

        <button type="submit" style="background-color: #4fc3f7; color: white; border: none; padding: 0.6rem 1rem; border-radius: 20px; cursor: pointer; font-weight: bold;">
            Create Author
        </button>
    </form>

    {% if show_message %}
      <p class="error-message" role="alert" style="color: #f44336; margin-top: 1rem;">
          Username already exists
      </p>
    {% endif %}

    <nav style="margin-top: 2rem;">
      <a href="{% url 'node-admin-dashboard' %}" class="pill" style="text-decoration: none; color: #00796b; font-weight: bold;">
        ← Back to Node Admin
      </a>
    </nav>
  </section>

</main>

</body>
</html>
