{% load static %}

<!doctype html>
<html>
<head>
  <title>Approve Users</title>
  <link rel="stylesheet" href="{% static 'honeydew/style.css' %}">
</head>

<body>

<main class="page">

<section class="feed">

<article class="post-card">

<h2>Pending User Approvals</h2>

{% if pending_users %}

<ul>
{% for user in pending_users %}

<li style="margin-bottom:10px;">
    {{ user.username }}

    <form method="post" action="{% url 'handle_approval' %}" style="display:inline;">
        {% csrf_token %}
        <input type="hidden" name="author_id" value="{{ user.id }}">

        <button type="submit" name="action" value="accept" class="pill">
            Accept
        </button>

        <button type="submit" name="action" value="reject" class="pill">
            Reject
        </button>

    </form>
</li>

{% endfor %}
</ul>

{% else %}
<p>No users waiting for approval.</p>
{% endif %}

</article>

<nav>
<a href="{% url 'node-admin-dashboard' %}" class="pill">
← Back to Node Admin
</a>
</nav>

</section>

</main>

</body>
</html>
